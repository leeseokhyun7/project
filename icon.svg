<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a9d43"/>
      <stop offset="1" stop-color="#245a26"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.3" cy="0.2" r="1">
      <stop offset="0" stop-color="#f0ffb4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f0ffb4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d8f6ff"/>
      <stop offset="0.5" stop-color="#28c8ff"/>
      <stop offset="1" stop-color="#0a86c0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#sun)"/>
  <!-- grass tufts -->
  <g stroke="#3c8b39" stroke-width="6" stroke-linecap="round" opacity="0.7">
    <path d="M70 430 l-10 -34 M90 430 l6 -30 M410 440 l10 -32 M440 430 l-6 -28 M120 460 l4 -26 M380 470 l-8 -24"/>
  </g>
  <!-- XP gem -->
  <g filter="url(#glow)" transform="translate(256 250)">
    <polygon points="0,-110 78,0 0,110 -78,0" fill="url(#gem)" stroke="#053a54" stroke-width="10"/>
    <polygon points="0,-110 78,0 0,0" fill="#eafaff" opacity="0.9"/>
    <ellipse cx="0" cy="150" rx="70" ry="20" fill="#053a54" opacity="0.35"/>
  </g>
</svg>
